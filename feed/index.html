<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>欧圈 - 欧洲华人社区信息流</title>
<meta name="description" content="欧圈，面向欧洲华人的移动端生活信息流。发布货源、招工、租房、二手、吐槽和商家动态。">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/assets/icons/icon-192.png?v=20260521" sizes="192x192">
<link rel="stylesheet" href="/feed/feed.css?v=20260601-ouquan">
</head>
<body>
<div class="app-shell">
  <header class="oq-header">
    <a class="oq-back" href="/" aria-label="返回首页">‹</a>
    <div class="oq-brand">
      <strong>欧圈</strong>
      <span>欧洲华人生活社区</span>
    </div>
    <button class="oq-search" type="button" id="searchToggle" aria-label="搜索">⌕</button>
  </header>

  <div class="oq-search-bar" id="searchBar" hidden>
    <input id="feedSearchInput" type="search" placeholder="搜索标题、城市、分类、WhatsApp">
  </div>

  <nav class="channel-tabs" id="channelTabs" aria-label="频道">
    <button class="active" type="button" data-channel="推荐">推荐</button>
    <button type="button" data-channel="附近">附近</button>
    <button type="button" data-channel="货源">货源</button>
    <button type="button" data-channel="招工">招工</button>
    <button type="button" data-channel="租房">租房</button>
    <button type="button" data-channel="二手">二手</button>
    <button type="button" data-channel="吐槽">吐槽</button>
    <button type="button" data-channel="商家">商家</button>
  </nav>

  <main class="feed-main" id="homeView">
    <section class="masonry-grid" id="feedGrid" aria-live="polite"></section>
  </main>
</div>

<nav class="bottom-nav" aria-label="底部导航">
  <button class="active" type="button" data-nav="home"><span>⌂</span><b>首页</b></button>
  <button type="button" data-nav="publish"><span>＋</span><b>发布</b></button>
  <button type="button" data-nav="messages"><span>✉</span><b>消息</b></button>
  <button type="button" data-nav="me"><span>◉</span><b>我的</b></button>
</nav>

<section class="detail-view" id="detailView" aria-hidden="true">
  <div class="detail-panel">
    <div class="detail-top">
      <button type="button" id="detailClose" aria-label="返回">‹</button>
      <strong>欧圈详情</strong>
      <button type="button" id="detailShareTop" aria-label="分享">↗</button>
    </div>
    <div class="detail-media" id="detailMedia"></div>
    <article class="detail-content">
      <div class="detail-author-row">
        <div class="avatar" id="detailAvatar">欧</div>
        <div>
          <strong id="detailAuthor">匿名用户</strong>
          <span id="detailMeta">西班牙</span>
        </div>
        <button class="follow-btn" type="button" id="detailFollow">关注</button>
      </div>
      <h1 id="detailTitle"></h1>
      <p id="detailText"></p>
      <div class="detail-tags" id="detailTags"></div>
      <div class="detail-actions">
        <button type="button" id="detailLike">♡ <span>0</span></button>
        <button type="button" id="detailSave">☆ <span>收藏</span></button>
        <button type="button" id="detailComment">评论</button>
        <button type="button" id="detailShare">分享</button>
      </div>
      <a class="detail-whatsapp" id="detailWhatsapp" href="#" target="_blank" rel="noopener">WhatsApp 联系</a>
      <section class="comment-box">
        <h2>评论</h2>
        <div class="comments-list" id="detailComments"></div>
        <div class="comment-input-row">
          <input id="commentInput" type="text" placeholder="说点什么，帮助更多华人了解情况">
          <button id="sendComment" type="button">发送</button>
        </div>
      </section>
    </article>
  </div>
</section>

<section class="compose-sheet" id="composeSheet" aria-hidden="true">
  <div class="sheet-panel">
    <div class="sheet-head">
      <button type="button" id="composeClose" aria-label="关闭">取消</button>
      <strong>发布到欧圈</strong>
      <button type="submit" form="feedPostForm" id="feedSubmitBtn">发布</button>
    </div>
    <form id="feedPostForm" class="compose-form">
      <label class="upload-box">
        <input id="feedMediaInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm,video/quicktime" multiple>
        <span>＋</span>
        <b>上传图片/视频</b>
        <small>图片最多9张，视频最多1个且30秒内</small>
      </label>
      <div class="media-preview" id="mediaPreview"></div>

      <label>
        标题
        <input id="feedTitle" type="text" maxlength="60" placeholder="写一个吸引人的标题">
      </label>
      <label>
        正文
        <textarea id="feedDescription" rows="6" maxlength="900" placeholder="分享货源、招工、租房、二手、吐槽或商家动态..."></textarea>
      </label>
      <div class="form-grid">
        <label>
          分类
          <select id="feedCategory">
            <option>货源</option>
            <option>招工</option>
            <option>租房</option>
            <option>二手</option>
            <option>吐槽</option>
            <option>商家</option>
            <option>生活</option>
          </select>
        </label>
        <label>
          城市
          <select id="feedCity">
            <option>Madrid</option>
            <option>Barcelona</option>
            <option>Valencia</option>
            <option>Alicante</option>
            <option>Sevilla</option>
            <option>Zaragoza</option>
            <option>Malaga</option>
            <option>Bilbao</option>
            <option>Badalona</option>
            <option>Fuenlabrada</option>
            <option>其他</option>
          </select>
        </label>
      </div>
      <label>
        WhatsApp / 电话
        <input id="feedWhatsapp" type="tel" placeholder="+34 6XX XXX XXX">
      </label>
      <label>
        标签
        <input id="feedTags" type="text" placeholder="#马德里 #百元店 #急招">
      </label>
      <label class="check-row">
        <input id="feedAnonymous" type="checkbox">
        <span>匿名发布，前台显示“匿名用户”</span>
      </label>
      <p class="publish-note">请勿发布违法、诈骗、仇恨、人身攻击、假货侵权等内容。违规内容会被删除。</p>
    </form>
  </div>
</section>

<section class="simple-sheet" id="messageSheet" aria-hidden="true">
  <div class="sheet-panel compact">
    <div class="sheet-head">
      <button type="button" data-close-simple="messageSheet">关闭</button>
      <strong>消息</strong>
      <span></span>
    </div>
    <div class="empty-card">
      <h2>暂无新消息</h2>
      <p>以后点赞、评论、关注和客服通知会出现在这里。</p>
    </div>
  </div>
</section>

<section class="simple-sheet" id="meSheet" aria-hidden="true">
  <div class="sheet-panel compact">
    <div class="sheet-head">
      <button type="button" data-close-simple="meSheet">关闭</button>
      <strong>我的</strong>
      <span></span>
    </div>
    <div class="profile-card">
      <div class="avatar big">欧</div>
      <h2 id="meName">欧圈用户</h2>
      <p id="meHint">登录主站账号后，可以同步发布、评论和互动记录。</p>
      <a href="/" class="home-link">返回西班牙生活通首页</a>
    </div>
  </div>
</section>

<div class="toast" id="feedToast"></div>

<template id="feedCardTemplate">
  <article class="feed-card">
    <button class="card-media" type="button"></button>
    <div class="card-copy">
      <h2></h2>
      <div class="card-user">
        <span class="avatar mini">欧</span>
        <span class="author">匿名用户</span>
      </div>
      <div class="card-stats">
        <span class="city"></span>
        <span class="like-count">♡ 0</span>
        <span class="comment-count">评论 0</span>
      </div>
    </div>
  </article>
</template>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/feed/feed.js?v=20260601-ouquan"></script>
</body>
</html>
