name: Apply merchant ad category

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-merchant-ad-category.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-category:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch merchant ad category
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f'Missing anchor: {label}')
              return text.replace(old, new, 1)

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          text = replace_once(text, '<option value="二手物品" data-i18n="nav.goods">📦 二手物品/车</option>\n        <option value="服务" data-i18n="nav.service">🛠 生活服务</option>', '<option value="二手物品" data-i18n="nav.goods">📦 二手物品/车</option>\n        <option value="商家广告" data-i18n="nav.merchantAd">🔥 商家广告/今日热卖</option>\n        <option value="服务" data-i18n="nav.service">🛠 生活服务</option>', 'post category option')
          text = replace_once(text, "const catIcons = { '招工':'👷','求职':'🙋','租房':'🏡','生意':'🏪','商家黄页':'🏪','二手车':'🚗','交友':'💕','二手物品':'📦','服务':'🛠','教育':'📚' };", "const catIcons = { '招工':'👷','求职':'🙋','租房':'🏡','生意':'🏪','商家黄页':'🏪','商家广告':'🔥','二手车':'🚗','交友':'💕','二手物品':'📦','服务':'🛠','教育':'📚' };", 'global cat icons')
          text = replace_once(text, "const catBadge = { '招工':'招聘','求职':'求职','租房':'出租','生意':'转让','商家黄页':'商家','二手车':'车辆','交友':'征友','二手物品':'出售','服务':'服务','教育':'招生' };", "const catBadge = { '招工':'招聘','求职':'求职','租房':'出租','生意':'转让','商家黄页':'商家','商家广告':'广告','二手车':'车辆','交友':'征友','二手物品':'出售','服务':'服务','教育':'招生' };", 'cat badge')
          text = replace_once(text, "const catMap   = { worker:'招工', jobseeker:'求职', house:'租房', business:'生意', merchant:'商家黄页', wholesale:'生意', wholesale_100:'生意', wholesale_bar:'生意', dating:'交友', goods:'二手物品', service:'服务', edu:'教育' };", "const catMap   = { worker:'招工', jobseeker:'求职', house:'租房', business:'生意', merchant:'商家黄页', merchant_ad:'商家广告', wholesale:'生意', wholesale_100:'生意', wholesale_bar:'生意', dating:'交友', goods:'二手物品', service:'服务', edu:'教育' };", 'cat map')
          text = replace_once(text, "const uiCatMap = { '招工':'worker', '求职':'jobseeker', '租房':'house', '生意':'business', '商家黄页':'merchant', '二手车':'goods', '交友':'dating', '二手物品':'goods', '服务':'service', '教育':'edu' };", "const uiCatMap = { '招工':'worker', '求职':'jobseeker', '租房':'house', '生意':'business', '商家黄页':'merchant', '商家广告':'merchant_ad', '二手车':'goods', '交友':'dating', '二手物品':'goods', '服务':'service', '教育':'edu' };", 'ui cat map')
          text = replace_once(text, "'nav.goods': '📦 二手物品/车', 'nav.service': '🛠 生活服务', 'nav.edu': '📚 教育培训',", "'nav.goods': '📦 二手物品/车', 'nav.merchantAd': '🔥 商家广告/今日热卖', 'nav.service': '🛠 生活服务', 'nav.edu': '📚 教育培训',", 'zh nav label')
          text = replace_once(text, "'cat.worker': '招工求职', 'cat.jobseeker': '求职自荐', 'cat.house': '租房买房', 'cat.business': '生意转让', 'cat.goods': '二手物品/车', 'cat.service': '生活服务', 'cat.edu': '教育培训',", "'cat.worker': '招工求职', 'cat.jobseeker': '求职自荐', 'cat.house': '租房买房', 'cat.business': '生意转让', 'cat.goods': '二手物品/车', 'cat.merchantAd': '商家广告/今日热卖', 'cat.service': '生活服务', 'cat.edu': '教育培训',", 'zh category label')
          text = replace_once(text, "'nav.goods': '📦 Segunda mano/coches', 'nav.service': '🛠 Servicios', 'nav.edu': '📚 Formación',", "'nav.goods': '📦 Segunda mano/coches', 'nav.merchantAd': '🔥 Publicidad comercial', 'nav.service': '🛠 Servicios', 'nav.edu': '📚 Formación',", 'es nav label')
          text = replace_once(text, "'cat.worker': 'Empleo', 'cat.jobseeker': 'Busco trabajo', 'cat.house': 'Vivienda', 'cat.business': 'Traspasos', 'cat.goods': 'Segunda mano/coches', 'cat.service': 'Servicios', 'cat.edu': 'Formación',", "'cat.worker': 'Empleo', 'cat.jobseeker': 'Busco trabajo', 'cat.house': 'Vivienda', 'cat.business': 'Traspasos', 'cat.goods': 'Segunda mano/coches', 'cat.merchantAd': 'Publicidad comercial', 'cat.service': 'Servicios', 'cat.edu': 'Formación',", 'es category label')
          text = replace_once(text, "const keyByCategory = { '招工':'cat.worker', '求职':'cat.jobseeker', '租房':'cat.house', '生意':'cat.business', '商家黄页':'merchant.prefix', '二手车':'cat.goods', '交友':'listing.dating', '二手物品':'cat.goods', '服务':'cat.service', '教育':'cat.edu' };", "const keyByCategory = { '招工':'cat.worker', '求职':'cat.jobseeker', '租房':'cat.house', '生意':'cat.business', '商家黄页':'merchant.prefix', '商家广告':'cat.merchantAd', '二手车':'cat.goods', '交友':'listing.dating', '二手物品':'cat.goods', '服务':'cat.service', '教育':'cat.edu' };", 'category label map')
          text = replace_once(text, "const labels = { '招工':'Empleo', '求职':'Busco trabajo', '租房':'Alquiler', '生意':'Traspaso', '商家黄页':'Comercio', '二手车':'Coche', '交友':'Contacto', '二手物品':'Venta', '服务':'Servicio', '教育':'Curso' };", "const labels = { '招工':'Empleo', '求职':'Busco trabajo', '租房':'Alquiler', '生意':'Traspaso', '商家黄页':'Comercio', '商家广告':'Publicidad', '二手车':'Coche', '交友':'Contacto', '二手物品':'Venta', '服务':'Servicio', '教育':'Curso' };", 'badge label map')
          text = replace_once(text, "return ['生意', '服务', '教育'].includes(String(category || ''));", "return ['生意', '商家广告', '服务', '教育'].includes(String(category || ''));", 'map category')
          text = replace_once(text, '<option value="服务">生活服务</option><option value="教育">教育培训</option></select><input id="editTitle"', '<option value="商家广告">商家广告/今日热卖</option><option value="服务">生活服务</option><option value="教育">教育培训</option></select><input id="editTitle"', 'profile edit category')
          text = replace_once(text, "const catIcons = {'招工':'👷','求职':'🙋','租房':'🏡','生意':'🏪','商家黄页':'🏪','二手车':'🚗','交友':'💕','二手物品':'📦','服务':'🛠','教育':'📚'};", "const catIcons = {'招工':'👷','求职':'🙋','租房':'🏡','生意':'🏪','商家黄页':'🏪','商家广告':'🔥','二手车':'🚗','交友':'💕','二手物品':'📦','服务':'🛠','教育':'📚'};", 'detail cat icons')
          text = replace_once(text, "var cn={worker:'招工',house:'租房',business:'生意转让',wholesale:'批发',dating:'交友',goods:'二手',service:'生活',edu:'教育','求职':'求职'};", "var cn={worker:'招工',house:'租房',business:'生意转让',merchant_ad:'商家广告',wholesale:'批发',dating:'交友',goods:'二手',service:'生活',edu:'教育','求职':'求职','商家广告':'商家广告'};", 'my listings category label')
          index.write_text(text, encoding='utf-8')

          admin = Path('admin.html')
          text = admin.read_text(encoding='utf-8')
          text = replace_once(text, '<option value="goods">二手物品/车</option>\n              <option value="服务">生活服务</option>', '<option value="goods">二手物品/车</option>\n              <option value="商家广告">商家广告/今日热卖</option>\n              <option value="服务">生活服务</option>', 'admin category filter')
          text = replace_once(text, "const ADMIN_EDIT_CATEGORIES = ['招工', '租房', '生意', '二手物品', '二手车', '服务', '教育'];", "const ADMIN_EDIT_CATEGORIES = ['招工', '租房', '生意', '二手物品', '二手车', '商家广告', '服务', '教育'];", 'admin edit categories')
          admin.write_text(text, encoding='utf-8')

          update_api = Path('api/admin-listing-update.js')
          text = update_api.read_text(encoding='utf-8')
          text = replace_once(text, "const CATEGORY_ALLOWLIST = new Set(['招工', '租房', '生意', '二手物品', '二手车', '服务', '教育']);", "const CATEGORY_ALLOWLIST = new Set(['招工', '租房', '生意', '二手物品', '二手车', '商家广告', '服务', '教育']);", 'admin update allowlist')
          update_api.write_text(text, encoding='utf-8')

          import_api = Path('api/admin-import-merchants.js')
          text = import_api.read_text(encoding='utf-8')
          text = replace_once(text, "  '\\u4e8c\\u624b\\u8f66'\n]);", "  '\\u4e8c\\u624b\\u8f66',\n  '\\u5546\\u5bb6\\u5e7f\\u544a'\n]);", 'import allowlist')
          import_api.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/apply-merchant-ad-category.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit result
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html admin.html api/admin-listing-update.js api/admin-import-merchants.js .github/workflows/apply-merchant-ad-category.yml
          git commit -m "feat: add merchant ad listing category"
          git push

